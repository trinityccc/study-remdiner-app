<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Study Reminder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Nunito", "ui-sans-serif", "system-ui"],
            },
            colors: {
              lavender: "#e9d5ff",
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="/assets/styles.css" />
  </head>
  <body class="font-sans text-gray-800">
    <div class="min-h-screen px-4 py-10">
      <div class="max-w-5xl mx-auto">
        <!-- Top bar -->
        <div class="glass rounded-2xl p-4 flex items-center justify-between gap-4 border border-white/60 animate-fade-in-up">
          <div>
            <div class="text-sm text-gray-600">Welcome back ✨</div>
            <div id="welcomeEmail" class="text-lg font-bold text-gray-900"></div>
          </div>
          <div class="flex items-center gap-2">
            <button id="themeToggle" class="theme-toggle" type="button">🌞 Light</button>
            <button
              id="logoutBtn"
              class="btn-glow rounded-xl border border-pink-200 bg-pink-50 px-4 py-2 text-sm font-semibold text-pink-700 hover:bg-pink-100 transition"
            >
              Logout
            </button>
          </div>
        </div>

        <!-- Grid -->
        <div class="mt-6 grid grid-cols-1 lg:grid-cols-5 gap-6">
          <!-- Form -->
          <div class="lg:col-span-2">
            <div class="glass rounded-2xl p-5 shadow-sm border border-white/60 animate-slide-up-soft">
              <h2 class="text-lg font-bold text-gray-900 dark:text-gray-100">
                📝 Add a reminder
              </h2>
              <p class="mt-1 text-sm text-gray-600 dark:text-gray-300">
                Soft reminders that keep you moving 💖
              </p>

              <div id="errorBox" class="hidden mt-4 text-sm text-rose-700 bg-rose-50 border border-rose-100 rounded-xl px-4 py-2"></div>

              <form id="reminderForm" class="mt-5 space-y-4">
                <div>
                  <label
                    for="title"
                    class="block text-sm font-semibold mb-1 text-gray-800 dark:text-gray-200"
                    >Title</label
                  >
                  <input
                    id="title"
                    type="text"
                    class="w-full rounded-xl border border-white/70 bg-white/80 px-4 py-2.5 outline-none focus:ring-4 focus:ring-pink-200"
                    placeholder="e.g., Math assignment"
                    required
                  />
                </div>
                <div>
                  <label
                    for="description"
                    class="block text-sm font-semibold mb-1 text-gray-800 dark:text-gray-200"
                    >Description (optional)</label
                  >
                  <textarea
                    id="description"
                    rows="3"
                    class="w-full rounded-xl border border-white/70 bg-white/80 px-4 py-2.5 outline-none focus:ring-4 focus:ring-pink-200"
                    placeholder="What do you need to do?"
                  ></textarea>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
                  <div>
                    <label for="type" class="block text-sm font-semibold mb-1 text-gray-800 dark:text-gray-200">Type</label>
                    <select
                      id="type"
                      class="w-full rounded-xl border border-white/70 bg-white/80 px-4 py-2.5 outline-none focus:ring-4 focus:ring-lavender/50"
                    >
                      <option value="assignment">Assignment</option>
                      <option value="exam">Exam</option>
                      <option value="revision">Revision</option>
                    </select>
                  </div>
                  <div>
                    <label for="priority" class="block text-sm font-semibold mb-1 text-gray-800 dark:text-gray-200">Priority</label>
                    <select
                      id="priority"
                      class="w-full rounded-xl border border-white/70 bg-white/80 px-4 py-2.5 outline-none focus:ring-4 focus:ring-lavender/50"
                    >
                      <option value="high">High</option>
                      <option value="medium" selected>Medium</option>
                      <option value="low">Low</option>
                    </select>
                  </div>
                </div>

                <div>
                  <label for="dueDate" class="block text-sm font-semibold mb-1 text-gray-800 dark:text-gray-200">Due date (optional)</label>
                  <input
                    id="dueDate"
                    type="datetime-local"
                    class="w-full rounded-xl border border-white/70 bg-white/80 px-4 py-2.5 outline-none focus:ring-4 focus:ring-pink-200"
                  />
                </div>

                <div class="hidden">
                  <label for="status">Status</label>
                  <select id="status">
                    <option value="pending" selected>pending</option>
                    <option value="completed">completed</option>
                  </select>
                </div>

                <button
                  id="addReminderBtn"
                  type="submit"
                  class="btn-glow w-full rounded-xl bg-pink-100 hover:bg-pink-200 border border-pink-200 py-2.5 font-semibold shadow-sm transition"
                >
                  Add reminder
                </button>
              </form>
            </div>
          </div>

          <!-- List -->
          <div class="lg:col-span-3">
            <div class="glass rounded-2xl p-5 shadow-sm border border-white/60 animate-slide-up-soft">
              <div class="flex items-center justify-between gap-3 flex-wrap">
                <div>
                  <h2 class="text-lg font-bold">📚 Your reminders</h2>
                  <p class="mt-1 text-sm text-gray-600">Only you can see your data 🔐</p>
                </div>

                <div class="flex gap-3 flex-wrap">
                  <div>
                    <label for="filterType" class="block text-xs font-semibold text-gray-600 mb-1">Type</label>
                    <select id="filterType" class="rounded-xl border border-white/70 bg-white/80 px-3 py-2 outline-none focus:ring-4 focus:ring-lavender/50">
                      <option value="all">All</option>
                      <option value="assignment">Assignment</option>
                      <option value="exam">Exam</option>
                      <option value="revision">Revision</option>
                    </select>
                  </div>
                  <div>
                    <label for="filterPriority" class="block text-xs font-semibold text-gray-600 mb-1">Priority</label>
                    <select id="filterPriority" class="rounded-xl border border-white/70 bg-white/80 px-3 py-2 outline-none focus:ring-4 focus:ring-lavender/50">
                      <option value="all">All</option>
                      <option value="high">High</option>
                      <option value="medium">Medium</option>
                      <option value="low">Low</option>
                    </select>
                  </div>
                </div>
              </div>

              <div id="loadingOverlay" class="hidden mt-6">
                <div class="flex items-center justify-center py-10">
                  <div class="spinner"></div>
                </div>
              </div>
              
              <div class="mt-6 space-y-4">
                <div>
                  <div class="flex items-center justify-between gap-3 flex-wrap">
                    <h3 class="text-base font-bold text-gray-900 dark:text-gray-100">Pending</h3>
                    <div class="text-sm text-gray-600 dark:text-gray-300">Keep going 💪</div>
                  </div>
                  <div id="pendingReminderList" class="mt-3 space-y-3"></div>
                </div>
                <div class="pt-3 border-t border-white/60 dark:border-white/15">
                  <div class="flex items-center justify-between gap-3 flex-wrap">
                    <h3 class="text-base font-bold text-gray-900 dark:text-gray-100">Completed</h3>
                    <div class="text-sm text-gray-600 dark:text-gray-300">Nice work 🎀</div>
                  </div>
                  <div id="completedReminderList" class="mt-3 space-y-3"></div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/assets/dashboard-page.js"></script>
  </body>
</html>
